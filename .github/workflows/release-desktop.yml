name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run desktop:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist-desktop/*.exe
          if-no-files-found: error

      - name: Upload Windows diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        run: |
          npm run runtime:env
          npm run build
          node ./scripts/run-electron-builder.cjs --config electron-builder.config.cjs --mac dmg zip --x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
          if-no-files-found: error

      - name: Upload macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/windows-release/*
            release-artifacts/macos-release/*
