name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Windows signing cache
        shell: pwsh
        run: |
          $cacheRoot = Join-Path $env:LOCALAPPDATA "electron-builder\Cache"
          $winCodeSignRoot = Join-Path $cacheRoot "winCodeSign"
          $targetDir = Join-Path $winCodeSignRoot "winCodeSign-2.6.0"
          $archivePath = Join-Path $winCodeSignRoot "winCodeSign-2.6.0.7z"

          New-Item -ItemType Directory -Force -Path $winCodeSignRoot | Out-Null

          if (Test-Path $targetDir) {
            Remove-Item -Recurse -Force $targetDir
          }

          if (Test-Path $archivePath) {
            Remove-Item -Force $archivePath
          }

          $sevenZip = (Resolve-Path ".\node_modules\7zip-bin\win\x64\7za.exe").Path

          Invoke-WebRequest `
            -Uri "https://github.com/electron-userland/electron-builder-binaries/releases/download/winCodeSign-2.6.0/winCodeSign-2.6.0.7z" `
            -OutFile $archivePath

          & $sevenZip x "-snld" "-bd" $archivePath "-o$targetDir" "-xr!darwin"

      - name: Sync runtime env
        run: npm run runtime:env

      - name: Build installer assets
        run: npm run installer:assets

      - name: Build Next app
        run: npm run build

      - name: Package Windows artifacts
        run: node ./scripts/run-electron-builder.cjs --config electron-builder.config.cjs --win nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist-desktop/*.exe
          if-no-files-found: error

      - name: Upload Windows diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime env
        run: npm run runtime:env

      - name: Build Next app
        run: npm run build

      - name: Package macOS artifacts
        run: node ./scripts/run-electron-builder.cjs --config electron-builder.config.cjs --mac dmg zip --x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
          if-no-files-found: error

      - name: Upload macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/windows-release/*
            release-artifacts/macos-release/*
