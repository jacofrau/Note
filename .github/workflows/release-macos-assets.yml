name: Release macOS Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach macOS assets to
        required: true
        default: v1.0.4-beta.0

permissions:
  contents: write

concurrency:
  group: release-macos-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-macos-assets:
    name: Publish macOS assets
    runs-on: macos-15-intel
    timeout-minutes: 30

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime env
        run: npm run runtime:env

      - name: Build Next app
        run: npm run build

      - name: Package macOS app
        run: node ./scripts/run-electron-builder.cjs --config electron-builder.config.cjs --mac dir --x64 --publish never

      - name: Archive macOS app
        shell: bash
        run: |
          app_path="$(find dist-desktop/mac -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "macOS app bundle not found" >&2
            exit 1
          fi

          version="$(node -p "require('./package.json').version")"
          zip_name="Note-${version}-mac-x64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist-desktop/$zip_name"

      - name: Publish macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist-desktop/*.zip

      - name: Upload macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn
