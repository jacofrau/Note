name: Release macOS Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach macOS assets to
        required: true
        default: v1.0.5-beta.0

permissions:
  contents: write

concurrency:
  group: release-macos-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-macos-assets:
    name: Publish macOS assets
    runs-on: macos-15-intel
    timeout-minutes: 30

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime env
        run: npm run runtime:env

      - name: Build Next app
        run: npm run build

      - name: Package macOS artifacts
        run: node ./scripts/run-electron-builder.cjs --config electron-builder.config.cjs --mac dmg zip --x64 --publish never

      - name: Publish macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.blockmap
            dist-desktop/latest-mac*.yml

      - name: Upload macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostics
          path: dist-desktop/**
          if-no-files-found: warn
